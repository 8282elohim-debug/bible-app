<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 성경·찬송가 앱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        header h1 { font-size: 20px; margin-bottom: 5px; }
        header p { font-size: 12px; opacity: 0.8; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: white; cursor: pointer; font-size: 14px; font-weight: bold; color: #333; }
        .tab-btn.active { background: #3498db; color: white; }
        .content { flex: 1; display: flex; overflow: hidden; }
        .bible-container { flex: 1; display: flex; }
        .sidebar { width: 120px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 8px; }
        .book-btn { width: 100%; padding: 5px; margin-bottom: 2px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 10px; text-align: left; }
        .book-btn.active { background: #3498db; color: white; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chapter-btns { padding: 8px; background: white; border-bottom: 1px solid #ddd; display: grid; grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 3px; overflow-y: auto; max-height: 50px; }
        .ch-btn { padding: 4px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .ch-btn.active { background: #3498db; color: white; }
        .verses { flex: 1; overflow-y: auto; padding: 15px; background: white; }
        .verse { margin-bottom: 12px; line-height: 1.8; }
        .verse-title { color: #666; font-size: 11px; margin-bottom: 3px; font-style: italic; }
        .verse-text { font-size: 13px; }
        .verse-num { color: #3498db; font-weight: bold; margin-right: 6px; }
        .hymn-tab { padding: 15px; flex: 1; overflow-y: auto; }
        .hymn-search { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .hymn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
        .hymn-num { padding: 12px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; text-align: center; cursor: pointer; font-weight: bold; color: #3498db; font-size: 14px; }
        .reading-tab { padding: 15px; flex: 1; overflow-y: auto; }
        .reading-date { font-size: 12px; color: #666; margin-bottom: 12px; }
        .reading-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .reading-item { padding: 12px; background: #e8f4f8; border: 1px solid #3498db; border-radius: 5px; cursor: pointer; text-align: center; }
        .reading-label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .reading-book { font-weight: bold; color: #2c3e50; }
        .hidden { display: none !important; }
        .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>📖 성경 · 찬송가</h1>
            <p>개역개정 66권 + 645곡 찬송가</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('bible')">📖 성경</button>
            <button class="tab-btn" onclick="showTab('hymn')">🎵 찬송가</button>
            <button class="tab-btn" onclick="showTab('reading')">📅 오늘의 읽기</button>
        </div>

        <div class="content">
            <div id="bible" class="bible-container">
                <div class="sidebar">
                    <button class="book-btn active" onclick="setTestament('nt')">신약(27)</button>
                    <button class="book-btn" onclick="setTestament('ot')">구약(39)</button>
                    <hr style="margin: 6px 0; border: none; border-top: 1px solid #ddd;">
                    <div id="bookList"></div>
                </div>
                <div class="main-area">
                    <div class="chapter-btns" id="chapterList"></div>
                    <div class="verses" id="verseList"><p style="color: #999; text-align: center; padding: 20px;">📖 데이터 로딩 중...</p></div>
                </div>
            </div>

            <div id="hymn" class="tab-content hidden">
                <div class="hymn-tab">
                    <input type="text" class="hymn-search" id="hymnSearch" placeholder="찬송가 번호 검색..." onkeyup="searchHymns()">
                    <div class="hymn-grid" id="hymnList"></div>
                </div>
            </div>

            <div id="reading" class="tab-content hidden">
                <div class="reading-tab">
                    <div class="reading-date" id="todayDate"></div>
                    <div class="reading-grid" id="readingList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOOKS_OT = {'창': '창세기', '출': '출애굽기', '레': '레위기', '민': '민수기', '신': '신명기', '수': '여호수아', '삿': '사사기', '룻': '룻기', '삼상': '사무엘상', '삼하': '사무엘하', '왕상': '열왕기상', '왕하': '열왕기하', '대상': '역대상', '대하': '역대하', '스': '에스라', '느': '느헤미야', '에': '에스더', '욥': '욥기', '시': '시편', '잠': '잠언', '전': '전도서', '아': '아가', '사': '이사야', '렘': '예레미야', '애': '예레미야애가', '겔': '에스겔', '단': '다니엘', '호': '호세아', '욜': '요엘', '암': '아모스', '옵': '오바댜', '욘': '요나', '미': '미가', '나': '나훔', '합': '하박국', '습': '스바냐', '학': '학개', '슥': '스가랴', '말': '말라기'};
        const BOOKS_NT = {'마': '마태복음', '막': '마가복음', '눅': '누가복음', '요': '요한복음', '행': '사도행전', '롬': '로마서', '고전': '고린도전서', '고후': '고린도후서', '갈': '갈라디아서', '엡': '에베소서', '빌': '빌립보서', '골': '골로새서', '살전': '데살로니가전서', '살후': '데살로니가후서', '딤전': '디모데전서', '딤후': '디모데후서', '딛': '디도서', '몬': '빌레몬서', '히': '히브리서', '약': '야고보서', '벧전': '베드로전서', '벧후': '베드로후서', '요일': '요한일서', '요이': '요한이서', '요삼': '요한삼서', '유': '유다서', '계': '요한계시록'};
        
        let biblesData = null;
        let currentTestament = 'nt', currentBook = '마', currentChapter = 1;

        async function loadData() {
            try {
                const url = 'https://raw.githubusercontent.com/8282elohim-debug/bible-app/main/bible_complete.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error('파일 로드 실패');
                biblesData = await response.json();
                
                renderBooks();
                renderChapters();
                renderVerses();
                searchHymns();
                initReading();
            } catch (e) {
                console.error('오류:', e);
                document.getElementById('verseList').innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">❌ 데이터 로드 오류</p>';
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            if (tab === 'bible') document.getElementById('bible').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setTestament(type) {
            currentTestament = type;
            currentBook = type === 'nt' ? '마' : '창';
            currentChapter = 1;
            renderBooks();
            renderChapters();
            renderVerses();
        }

        function renderBooks() {
            const books = currentTestament === 'nt' ? BOOKS_NT : BOOKS_OT;
            let html = '';
            for (let [abbr, name] of Object.entries(books)) {
                html += `<button class="book-btn ${abbr === currentBook ? 'active' : ''}" onclick="selectBook('${abbr}')">${abbr}</button>`;
            }
            document.getElementById('bookList').innerHTML = html;
        }

        function selectBook(abbr) {
            currentBook = abbr;
            currentChapter = 1;
            renderBooks();
            renderChapters();
            renderVerses();
        }

        function renderChapters() {
            if (!biblesData) return;
            const books = currentTestament === 'nt' ? biblesData.ntBooks : biblesData.otBooks;
            const book = books[currentBook];
            if (!book || !book.chapters) return;
            
            let html = '';
            for (let ch in book.chapters) {
                const num = parseInt(ch);
                html += `<button class="ch-btn ${num === currentChapter ? 'active' : ''}" onclick="selectChapter(${num})">${num}</button>`;
            }
            document.getElementById('chapterList').innerHTML = html;
        }

        function selectChapter(ch) {
            currentChapter = ch;
            renderChapters();
            renderVerses();
        }

        function renderVerses() {
            if (!biblesData) return;
            
            const books = currentTestament === 'nt' ? biblesData.ntBooks : biblesData.otBooks;
            const book = books[currentBook];
            if (!book) return;
            
            const bookName = book.name;
            const chapters = book.chapters;
            const verses = chapters[currentChapter];
            
            let html = `<h3 style="color: #2c3e50; margin-bottom: 12px;">${bookName} ${currentChapter}장</h3>`;
            
            if (verses && verses.length > 0) {
                verses.forEach(v => {
                    const verse = typeof v === 'string' ? JSON.parse(v) : v;
                    html += `<div class="verse">`;
                    if (verse.title) html += `<div class="verse-title">⟨${verse.title}⟩</div>`;
                    html += `<div class="verse-text"><span class="verse-num">${currentBook}${currentChapter}:${verse.verse}</span> ${verse.content}</div></div>`;
                });
            } else {
                html += `<p style="color: #999; margin-top: 20px;">📖 이 장의 데이터가 없습니다</p>`;
            }
            document.getElementById('verseList').innerHTML = html;
        }

        function searchHymns() {
            const search = document.getElementById('hymnSearch').value || '';
            let start = 1, end = 20;
            if (search) {
                const num = parseInt(search);
                if (!isNaN(num)) {
                    start = Math.max(1, num - 5);
                    end = Math.min(645, num + 15);
                }
            }
            let html = '';
            for (let i = start; i <= end; i++) {
                html += `<div class="hymn-num">${i}</div>`;
            }
            document.getElementById('hymnList').innerHTML = html;
        }

        function initReading() {
            if (!biblesData || !biblesData.readingPlan) return;
            
            const today = new Date();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            document.getElementById('todayDate').innerHTML = `${today.getFullYear()}년 ${month}월 ${date}일`;
            
            const monthStr = `${month}월`;
            const dayStr = `${date}일`;
            
            if (biblesData.readingPlan[monthStr] && biblesData.readingPlan[monthStr][dayStr]) {
                const reading = biblesData.readingPlan[monthStr][dayStr];
                const items = [
                    { l: '구약1', c: reading.ot1 },
                    { l: '신약', c: reading.nt },
                    { l: '구약2', c: reading.ot2 },
                    { l: '행전', c: reading.acts }
                ];
                let html = '';
                items.forEach(item => {
                    if (!item.c) return;
                    const m = item.c.match(/^([가-힣]+)(\d+)/);
                    if (m) {
                        const b = m[1], ch = parseInt(m[2]);
                        const bn = BOOKS_OT[b] || BOOKS_NT[b] || b;
                        html += `<div class="reading-item" onclick="goToVerse('${b}', ${ch})"><div class="reading-label">${item.l}</div><div class="reading-book">${bn} ${ch}장</div></div>`;
                    }
                });
                document.getElementById('readingList').innerHTML = html;
            }
        }

        function goToVerse(book, ch) {
            currentTestament = BOOKS_OT[book] ? 'ot' : 'nt';
            currentBook = book;
            currentChapter = ch;
            document.querySelectorAll('.tab-btn')[0].click();
            renderBooks();
            renderChapters();
            renderVerses();
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
