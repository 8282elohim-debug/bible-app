<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 성경·찬송가 앱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        header h1 { font-size: 20px; margin-bottom: 5px; }
        header p { font-size: 12px; opacity: 0.8; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: white; cursor: pointer; font-size: 14px; font-weight: bold; color: #333; }
        .tab-btn.active { background: #3498db; color: white; }
        .content { flex: 1; display: flex; overflow: hidden; }
        .bible-container { flex: 1; display: flex; }
        .sidebar { width: 140px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 8px; }
        .book-btn { width: 100%; padding: 6px; margin-bottom: 3px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 11px; text-align: left; }
        .book-btn.active { background: #3498db; color: white; }
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chapter-btns { padding: 10px; background: white; border-bottom: 1px solid #ddd; display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 4px; overflow-y: auto; max-height: 60px; }
        .ch-btn { padding: 5px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; border-radius: 3px; font-size: 11px; font-weight: bold; }
        .ch-btn.active { background: #3498db; color: white; }
        .verses { flex: 1; overflow-y: auto; padding: 15px; background: white; }
        .verse { margin-bottom: 15px; line-height: 1.8; }
        .verse-title { color: #666; font-size: 11px; margin-bottom: 3px; font-style: italic; }
        .verse-text { font-size: 13px; }
        .verse-num { color: #3498db; font-weight: bold; margin-right: 6px; }
        .hymn-tab { padding: 15px; }
        .hymn-search { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .hymn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
        .hymn-num { padding: 12px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; text-align: center; cursor: pointer; font-weight: bold; color: #3498db; }
        .reading-tab { padding: 15px; }
        .reading-date { font-size: 12px; color: #666; margin-bottom: 12px; }
        .reading-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .reading-item { padding: 12px; background: #e8f4f8; border: 1px solid #3498db; border-radius: 5px; cursor: pointer; text-align: center; }
        .reading-label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .reading-book { font-weight: bold; color: #2c3e50; }
        .hidden { display: none !important; }
        .tab-content { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>📖 성경 · 찬송가</h1>
            <p>개역개정 66권 + 645곡 찬송가</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('bible')">📖 성경</button>
            <button class="tab-btn" onclick="showTab('hymn')">🎵 찬송가</button>
            <button class="tab-btn" onclick="showTab('reading')">📅 오늘의 읽기</button>
        </div>

        <div class="content">
            <div id="bible" class="bible-container">
                <div class="sidebar">
                    <button class="book-btn active" onclick="setTestament('nt')">신약 (27)</button>
                    <button class="book-btn" onclick="setTestament('ot')">구약 (39)</button>
                    <hr style="margin: 8px 0; border: none; border-top: 1px solid #ddd;">
                    <div id="bookList"></div>
                </div>
                <div class="main-area">
                    <div class="chapter-btns" id="chapterList"></div>
                    <div class="verses" id="verseList"></div>
                </div>
            </div>

            <div id="hymn" class="tab-content hidden">
                <div class="hymn-tab">
                    <input type="text" class="hymn-search" id="hymnSearch" placeholder="찬송가 번호 검색..." onkeyup="searchHymns()">
                    <div class="hymn-grid" id="hymnList"></div>
                </div>
            </div>

            <div id="reading" class="tab-content hidden">
                <div class="reading-tab">
                    <div class="reading-date" id="todayDate"></div>
                    <div class="reading-grid" id="readingList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOOKS_OT = {'창': '창세기', '출': '출애굽기', '레': '레위기', '민': '민수기', '신': '신명기', '수': '여호수아', '삿': '사사기', '룻': '룻기', '삼상': '사무엘상', '삼하': '사무엘하', '왕상': '열왕기상', '왕하': '열왕기하', '대상': '역대상', '대하': '역대하', '스': '에스라', '느': '느헤미야', '에': '에스더', '욥': '욥기', '시': '시편', '잠': '잠언', '전': '전도서', '아': '아가', '사': '이사야', '렘': '예레미야', '애': '예레미야애가', '겔': '에스겔', '단': '다니엘', '호': '호세아', '욜': '요엘', '암': '아모스', '옵': '오바댜', '욘': '요나', '미': '미가', '나': '나훔', '합': '하박국', '습': '스바냐', '학': '학개', '슥': '스가랴', '말': '말라기'};
        const BOOKS_NT = {'마': '마태복음', '막': '마가복음', '눅': '누가복음', '요': '요한복음', '행': '사도행전', '롬': '로마서', '고전': '고린도전서', '고후': '고린도후서', '갈': '갈라디아서', '엡': '에베소서', '빌': '빌립보서', '골': '골로새서', '살전': '데살로니가전서', '살후': '데살로니가후서', '딤전': '디모데전서', '딤후': '디모데후서', '딛': '디도서', '몬': '빌레몬서', '히': '히브리서', '약': '야고보서', '벧전': '베드로전서', '벧후': '베드로후서', '요일': '요한일서', '요이': '요한이서', '요삼': '요한삼서', '유': '유다서', '계': '요한계시록'};
        const CHAPTERS = {'창': 50, '출': 40, '레': 27, '민': 36, '신': 34, '수': 24, '삿': 21, '룻': 4, '삼상': 31, '삼하': 24, '왕상': 22, '왕하': 25, '대상': 29, '대하': 36, '스': 10, '느': 13, '에': 10, '욥': 42, '시': 150, '잠': 31, '전': 12, '아': 8, '사': 66, '렘': 52, '애': 5, '겔': 48, '단': 12, '호': 14, '욜': 3, '암': 9, '옵': 1, '욘': 4, '미': 7, '나': 3, '합': 3, '습': 3, '학': 2, '슥': 14, '말': 4, '마': 28, '막': 16, '눅': 24, '요': 21, '행': 28, '롬': 16, '고전': 16, '고후': 13, '갈': 6, '엡': 6, '빌': 4, '골': 4, '살전': 5, '살후': 3, '딤전': 6, '딤후': 4, '딛': 3, '몬': 1, '히': 13, '약': 5, '벧전': 5, '벧후': 3, '요일': 5, '요이': 1, '요삼': 1, '유': 1, '계': 22};
        
        const VERSES = {'마1': [{v: 1, t: '예수 그리스도의 계보', c: '아브라함과 다윗의 자손 예수 그리스도의 계보라'}, {v: 21, c: '아들을 낳으리니 이름을 예수라 하라 이는 그가 자기 백성을 그들의 죄에서 구원할 자이심이라'}], '마2': [{v: 1, c: '헤롯 왕 때에 예수께서 유대 베들레헴에서 나시매 동방으로부터 박사들이 예루살렘에 이르러'}, {v: 11, c: '집에 들어가 아기와 그의 어머니 마리아가 함께 있는 것을 보고 엎드려 아기께 경배하고'}], '창1': [{v: 1, t: '천지 창조', c: '태초에 하나님이 천지를 창조하시니라'}, {v: 3, c: '하나님이 이르시되 빛이 있으라 하시니 빛이 있었고'}, {v: 27, c: '하나님이 자기 형상 곧 하나님의 형상대로 사람을 창조하시되 남자와 여자를 창조하시고'}], '창2': [{v: 1, c: '천지와 만물이 다 이루어지니라'}, {v: 2, t: '일곱째 날', c: '하나님이 일곱째 날을 거룩하게 하시고 복을 주셨으니'}], '행1': [{v: 1, c: '데오빌로여 내가 먼저 쓴 글에서 예수께서 하신 모든 일과 가르치신 것을 기록하였으나'}, {v: 8, c: '오직 성령이 너희에게 임하시면 너희가 예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 되리라'}], '행2': [{v: 1, c: '오순절 날이 이미 이르매 저희가 다 한 곳에 모였더니'}, {v: 4, c: '저희가 다 성령의 충만함을 받고 성령이 말하게 하심을 따라 다른 방언으로 말하기를 시작하니라'}], '요1': [{v: 1, t: '말씀이 육신이 되심', c: '태초에 말씀이 계시니라 이 말씀이 하나님과 함께 계셨으니 이 말씀은 곧 하나님이시니라'}, {v: 14, c: '말씀이 육신이 되어 우리 가운데 거하시매 우리가 그의 영광을 보니 아버지의 독생자의 영광이요'}], '눅1': [{v: 1, c: '우리 중에 이루어진 사실에 대하여 처음부터 목격한 자들과 말씀의 종된 자들이 전하여 준 그대로'}, {v: 26, c: '여섯째 달에 천사 가브리엘이 하나님께로부터 갈릴리 나사렛 동네에 보내심을 받아'}], '롬1': [{v: 1, c: '예수 그리스도의 종 바울은 사도로 부르심을 받아 하나님의 복음을 위하여 구별함을 받았으니'}, {v: 16, c: '내가 복음을 부끄러워하지 아니하노니 이 복음은 모든 믿는 자에게 구원을 주시는 하나님의 능력이 됨이라'}], '고전13': [{v: 1, c: '내가 사람의 방언과 천사의 말을 할지라도 사랑이 없으면 울리는 꽹과리나 울리는 종이 되고'}, {v: 13, c: '그런즉 믿음, 소망, 사랑, 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라'}], '엡2': [{v: 8, c: '너희가 그 은혜를 통하여 믿음으로 말미암아 구원을 받았으니 이것이 너희에게서 난 것이 아니요 하나님의 선물이라'}, {v: 10, c: '우리는 그의 만드신 바라 그리스도 예수 안에서 선한 일을 위하여 지으심을 받은 자니'}], '빌4': [{v: 6, c: '아무것도 염려하지 말고 오직 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라'}, {v: 13, c: '내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라'}], '히11': [{v: 1, t: '믿음의 정의', c: '믿음은 바라는 것들의 실상이요 보이지 않는 것들의 증거니'}, {v: 6, c: '믿음이 없이는 하나님을 기쁘시게 하지 못하나니'}], '계21': [{v: 1, c: '또 내가 새 하늘과 새 땅을 보니 처음 하늘과 처음 땅이 없어졌고 바다도 다시 있지 않더라'}, {v: 4, c: '하나님이 저희 모든 눈물을 씻어 주실 것이니 다시 사망이 없고'}]};
        
        const READING_PLAN = {'1월1일': {o1: '창1', n: '마1', o2: '스1', a: '행1'}, '1월2일': {o1: '창2', n: '마2', o2: '스2', a: '행2'}, '2월1일': {o1: '창8', n: '마7', o2: '스10', a: '행8'}};

        let currentTestament = 'nt', currentBook = '마', currentChapter = 1;

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            if (tab === 'bible') document.getElementById('bible').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setTestament(type) {
            currentTestament = type;
            currentBook = type === 'nt' ? '마' : '창';
            currentChapter = 1;
            renderBooks();
            renderChapters();
            renderVerses();
        }

        function renderBooks() {
            const books = currentTestament === 'nt' ? BOOKS_NT : BOOKS_OT;
            let html = '';
            for (let [abbr, name] of Object.entries(books)) {
                html += `<button class="book-btn ${abbr === currentBook ? 'active' : ''}" onclick="selectBook('${abbr}')">${abbr}</button>`;
            }
            document.getElementById('bookList').innerHTML = html;
        }

        function selectBook(abbr) {
            currentBook = abbr;
            currentChapter = 1;
            renderBooks();
            renderChapters();
            renderVerses();
        }

        function renderChapters() {
            const max = CHAPTERS[currentBook] || 1;
            let html = '';
            for (let i = 1; i <= max; i++) {
                html += `<button class="ch-btn ${i === currentChapter ? 'active' : ''}" onclick="selectChapter(${i})">${i}</button>`;
            }
            document.getElementById('chapterList').innerHTML = html;
        }

        function selectChapter(ch) {
            currentChapter = ch;
            renderChapters();
            renderVerses();
        }

        function renderVerses() {
            const bookName = currentTestament === 'nt' ? BOOKS_NT[currentBook] : BOOKS_OT[currentBook];
            const key = currentBook + currentChapter;
            const verses = VERSES[key] || [];
            let html = `<h3>${bookName} ${currentChapter}장</h3>`;
            if (verses.length > 0) {
                verses.forEach(v => {
                    html += `<div class="verse">`;
                    if (v.t) html += `<div class="verse-title">⟨${v.t}⟩</div>`;
                    html += `<div class="verse-text"><span class="verse-num">${currentBook}${currentChapter}:${v.v}</span> ${v.c}</div></div>`;
                });
            } else {
                html += `<p style="color: #999; margin-top: 20px;">📖 이 장의 전체 구절을 보려면<br>완전한 데이터를 업로드하세요.</p>`;
            }
            document.getElementById('verseList').innerHTML = html;
        }

        function searchHymns() {
            const search = document.getElementById('hymnSearch').value;
            const start = search ? Math.max(1, parseInt(search) - 5) : 1;
            const end = search ? Math.min(645, parseInt(search) + 15) : 20;
            let html = '';
            for (let i = start; i <= end; i++) html += `<div class="hymn-num">${i}</div>`;
            document.getElementById('hymnList').innerHTML = html;
        }

        function initReading() {
            const today = new Date();
            document.getElementById('todayDate').innerHTML = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
            const key = `${today.getMonth() + 1}월${today.getDate()}일`;
            const reading = READING_PLAN[key];
            if (reading) {
                const items = [{l: '구약1', c: reading.o1}, {l: '신약', c: reading.n}, {l: '구약2', c: reading.o2}, {l: '행전', c: reading.a}];
                let html = '';
                items.forEach(item => {
                    const m = item.c.match(/^([가-힣]+)(\d+)$/);
                    if (m) {
                        const b = m[1], ch = m[2], bn = BOOKS_OT[b] || BOOKS_NT[b];
                        html += `<div class="reading-item" onclick="goToVerse('${b}', ${ch})"><div class="reading-label">${item.l}</div><div class="reading-book">${bn} ${ch}장</div></div>`;
                    }
                });
                document.getElementById('readingList').innerHTML = html;
            }
        }

        function goToVerse(book, ch) {
            currentTestament = BOOKS_OT[book] ? 'ot' : 'nt';
            currentBook = book;
            currentChapter = ch;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('bible').classList.remove('hidden');
            renderBooks();
            renderChapters();
            renderVerses();
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderBooks();
            renderChapters();
            renderVerses();
            searchHymns();
            initReading();
        });
    </script>
</body>
</html>
