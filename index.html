<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #f5f5f5; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        header { background: #2c3e50; color: white; padding: 12px 16px; text-align: center; }
        header h1 { margin: 0; font-size: 18px; }
        header p { margin: 0; font-size: 12px; opacity: 0.8; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; background: white; }
        .tabs button { flex: 1; padding: 12px; border: none; background: white; color: #333; cursor: pointer; font-size: 14px; font-weight: bold; }
        .tabs button.active { background: #3498db; color: white; }
        .content { flex: 1; overflow: auto; display: flex; }
        .sidebar { width: 150px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 8px; }
        .sidebar button { width: 100%; padding: 6px; margin-bottom: 4px; border: 1px solid #ddd; background: #f9f9f9; color: #333; cursor: pointer; border-radius: 4px; font-size: 11px; text-align: left; }
        .sidebar button.active { background: #3498db; color: white; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .chapters { padding: 8px 12px; border-bottom: 1px solid #ddd; background: white; display: grid; grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 4px; }
        .chapters button { padding: 4px; background: #ecf0f1; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .chapters button.active { background: #3498db; color: white; }
        .verses { flex: 1; overflow-y: auto; padding: 12px; background: white; }
        .verse { margin-bottom: 12px; line-height: 1.6; }
        .verse-title { font-size: 11px; color: #666; margin-bottom: 2px; font-style: italic; }
        .verse-text { font-size: 13px; }
        .verse-num { font-weight: bold; color: #3498db; margin-right: 6px; }
        .hymn-search { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .hymn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; overflow-y: auto; padding: 12px; }
        .hymn-item { padding: 12px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; color: #3498db; }
        .reading { padding: 16px; overflow-y: auto; }
        .reading-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; }
        .reading-item { padding: 12px; background: #e8f4f8; border: 1px solid #3498db; border-radius: 8px; cursor: pointer; text-align: center; }
        .reading-label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .reading-value { font-weight: bold; color: #333; }
        .hidden { display: none; }
    </style>
</head>

            ],
            '계1': [
                { v: 1, title: '요한계시록의 시작', text: '예수 그리스도의 계시라 이것은 하나님이 그에게 주사 종들에게 보이기 위하여 빨리 될 일들을 알리심이라' },
                { v: 8, text: '주 하나님이 가라사대 나는 알파요 오메가니 곧 이제도 있고 전에도 있었고 장차 올 자요' }
            ],
            '계21': [
                { v: 1, title: '새 하늘과 새 땅', text: '또 내가 새 하늘과 새 땅을 보니 처음 하늘과 처음 땅이 없어졌고 바다도 다시 있지 않더라' },
                { v: 4, text: '하나님이 저희 모든 눈물을 씻어 주실 것이니 다시 사망이 없고 애통하는 것이나 곡하는 것이나 아픈 것이 다시 있지 아니하리니' }
            ]
        };

        // 초기화
        function init() {
            renderBookList();
            renderChapters();
            renderVerses();
            renderHymns();
            renderReading();
            setupEventListeners();
        }

        function renderBookList() {
            const bookData = currentTestament === 'nt' ? BIBLE_DATA.nt : BIBLE_DATA.ot;
            const html = Object.entries(bookData).map(([abbr, name]) => 
                `<button class="book-btn ${abbr === currentBook ? 'active' : ''}" data-book="${abbr}">${abbr} ${name.slice(0,5)}</button>`
            ).join('');
            document.getElementById('book-list').innerHTML = html;

            document.querySelectorAll('.book-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentBook = e.target.dataset.book;
                    currentChapter = 1;
                    renderBookList();
                    renderChapters();
                    renderVerses();
                });
            });
        }

        function renderChapters() {
            const chapters = CHAPTERS[currentBook] || 1;
            const html = Array.from({length: chapters}, (_, i) => i + 1).map(ch =>
                `<button class="chapter-btn ${ch === currentChapter ? 'active' : ''}" data-ch="${ch}">${ch}</button>`
            ).join('');
            document.getElementById('chapter-list').innerHTML = html;

            document.querySelectorAll('.chapter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentChapter = parseInt(e.target.dataset.ch);
                    renderChapters();
                    renderVerses();
                });
            });
        }

        function renderVerses() {
            const bookName = currentTestament === 'nt' ? BIBLE_DATA.nt[currentBook] : BIBLE_DATA.ot[currentBook];
            const key = currentBook + currentChapter;
            const verses = SAMPLE_VERSES[key] || [];

            let html = `<p style="font-weight: bold; margin-bottom: 12px;">${bookName} ${currentChapter}장</p>`;
            html += verses.map(v => `
                <div class="verse">
                    ${v.title ? `<div class="verse-title">⟨${v.title}⟩</div>` : ''}
                    <div class="verse-text">
                        <span class="verse-num">${currentBook}${currentChapter}:${v.v}</span>
                        ${v.text}
                    </div>
                </div>
            `).join('');

            if (verses.length === 0) {
                html += `<p style="color: #666; font-size: 12px;">📖 전체 성경 구절을 보려면 JSON 데이터를 함께 사용하세요.</p>`;
            }

            document.getElementById('verses').innerHTML = html;
        }

        function renderHymns() {
            const html = Array.from({length: 645}, (_, i) => i + 1).slice(0, 20).map(num =>
                `<div class="hymn-item">${num}</div>`
            ).join('');
            document.getElementById('hymn-list').innerHTML = html;

            document.getElementById('hymn-search').addEventListener('input', (e) => {
                const search = e.target.value;
                const filtered = search ? 
                    Array.from({length: 645}, (_, i) => i + 1).filter(n => n.toString().includes(search)).slice(0, 20) :
                    Array.from({length: 645}, (_, i) => i + 1).slice(0, 20);
                
                const html = filtered.map(num => `<div class="hymn-item">${num}</div>`).join('');
                document.getElementById('hymn-list').innerHTML = html;
            });
        }

        function renderReading() {
            const today = new Date();
            document.getElementById('today-date').textContent = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;

            const readings = {
                '1월1일': { ot1: '창1', nt: '마1', ot2: '스1', acts: '행1' },
                '1월2일': { ot1: '창2', nt: '마2', ot2: '스2', acts: '행2' },
            };
            const key = `${today.getMonth() + 1}월${today.getDate()}일`;
            const reading = readings[key];

            if (reading) {
                const html = [
                    { label: '구약 1', value: reading.ot1 },
                    { label: '신약', value: reading.nt },
                    { label: '구약 2', value: reading.ot2 },
                    { label: '사도행전', value: reading.acts }
                ].map(item => {
                    const match = item.value.match(/^([가-힣]+)(\d+)$/);
                    const bookName = match ? (BIBLE_DATA.ot[match[1]] || BIBLE_DATA.nt[match[1]]) : '책';
                    const chapter = match ? match[2] : '1';
                    return `
                        <div class="reading-item" onclick="selectReading('${match[1]}', ${chapter})">
                            <div class="reading-label">${item.label}</div>
                            <div class="reading-value">${bookName} ${chapter}장</div>
                        </div>
                    `;
                }).join('');
                document.getElementById('reading-list').innerHTML = html;
            }
        }

        function selectReading(book, chapter) {
            const isOT = BIBLE_DATA.ot[book];
            currentTestament = isOT ? 'ot' : 'nt';
            currentBook = book;
            currentChapter = chapter;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(div => div.classList.add('hidden'));
            document.querySelector('[data-tab="bible"]').classList.add('active');
            document.getElementById('bible').classList.remove('hidden');

            renderBookList();
            renderChapters();
            renderVerses();
        }

        function setupEventListeners() {
            document.getElementById('ot-btn').addEventListener('click', () => {
                currentTestament = 'ot';
                currentBook = '창';
                currentChapter = 1;
                renderBookList();
                renderChapters();
                renderVerses();
            });

            document.getElementById('nt-btn').addEventListener('click', () => {
                currentTestament = 'nt';
                currentBook = '마';
                currentChapter = 1;
                renderBookList();
                renderChapters();
                renderVerses();
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tab = e.target.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(d => d.classList.add('hidden'));
                    e.target.classList.add('active');
                    document.getElementById(tab).classList.remove('hidden');
                });
            });
        }

        init();
    </script>
</body>
</html>
